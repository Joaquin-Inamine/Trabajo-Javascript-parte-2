<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo 1</title>
</head>
<h2>Cambio de colores</h2>

<body>
    <div class="container">
        <div class="cuadrado violeta" onclick="cambiofondo('violet')"></div>
        <div class="cuadrado amarillo" onclick="cambiofondo('yellow')"></div>
        <div class="cuadrado azul" onclick="cambiofondo('blue')"></div>
    </div>

    <style>
        .container {
            display: flex;
        }

        .cuadrado {
            height: 100px;
            width: 50px;
            cursor: pointer;
        }

        .violeta {
            background-color: blueviolet;
        }

        .amarillo {
            background-color: yellow;
        }

        .azul {
            background-color: blue;
        }
    </style>

    <script>

        function cambiofondo(color) {
            document.querySelector('body').style.background = color;
        }

    </script>
</body>

</html>
